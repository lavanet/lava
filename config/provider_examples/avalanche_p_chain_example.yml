# Avalanche P-Chain provider config (AVALANCHEP/AVALANCHEPT spec)
# Only requires internal path: /P
endpoints:
  - api-interface: jsonrpc
    chain-id: AVALANCHEPT
    network-address:
      address: 127.0.0.1:2221
    node-urls:
      - url: https://api.avax-test.network/ext/bc/P
        internal-path: "/P"
