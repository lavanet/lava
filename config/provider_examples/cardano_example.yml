    chain-id: ADA
    network-address:
      address: "127.0.0.1:2221"
    node-urls:
      - url: "https://cardano-mainnet.blockfrost.io/api/v0"
        auth-config:
          auth-headers:
            project_id: <YOUR_PROJECT_ID>
