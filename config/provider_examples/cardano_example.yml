# Cardano provider configuration using Blockfrost as the node backend.
# Blockfrost requires a project_id header for authentication.
# Get your project_id at https://blockfrost.io after creating a project for the
# corresponding network (mainnet, preprod, or preview).
# Port 2221 is the default Lava provider listen port.
endpoints:
  - api-interface: rest
    chain-id: ADA
    network-address:
      address: "127.0.0.1:2221"
    node-urls:
      - url: "https://cardano-mainnet.blockfrost.io/api/v0"
        auth-config:
          auth-headers:
            project_id: <YOUR_PROJECT_ID> # Blockfrost mainnet project ID
  - api-interface: rest
    chain-id: ADAT
    network-address:
      address: "127.0.0.1:2221"
    node-urls:
      - url: "https://cardano-preprod.blockfrost.io/api/v0"
        auth-config:
          auth-headers:
            project_id: <YOUR_PROJECT_ID> # Blockfrost preprod project ID
  - api-interface: rest
    chain-id: ADAPRE
    network-address:
      address: "127.0.0.1:2221"
    node-urls:
      - url: "https://cardano-preview.blockfrost.io/api/v0"
        auth-config:
          auth-headers:
            project_id: <YOUR_PROJECT_ID> # Blockfrost preview project ID