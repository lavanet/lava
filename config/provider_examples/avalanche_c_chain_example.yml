# Avalanche C-Chain provider config (AVAXC/AVAXCT spec)
# Requires internal paths: /C/rpc (EVM + Warp APIs), /C/avax (atomic tx methods)
# Warp APIs require the node to be configured with warp-api-enabled=true
endpoints:
  - api-interface: jsonrpc
    chain-id: AVAXCT
    network-address:
      address: 127.0.0.1:2220
    node-urls:
      - url: https://api.avax-test.network/ext/bc/C/rpc
        internal-path: "/C/rpc"
      - url: wss://api.avax-test.network/ext/bc/C/ws
        internal-path: "/C/rpc"
      - url: https://api.avax-test.network/ext/bc/C/avax
        internal-path: "/C/avax"
