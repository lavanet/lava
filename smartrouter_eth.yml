# Smart Router Direct RPC Configuration
# Testing Phases 1-5: JSON-RPC over HTTP/HTTPS + WebSocket Subscriptions
# Mode: Direct connections to Ethereum RPC endpoints (no Lava providers!)

endpoints:
  - listen-address: "0.0.0.0:3360"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    network-address: "0.0.0.0:3360"

direct-rpc:
  # HTTP Endpoint 1
  - name: "eth-rpc-1"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://eth.llamarpc.com"
        skip-verifications:
          - chain-id
          - pruning

  # HTTP Endpoint 2
  - name: "eth-rpc-2"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://json-rpc.8zfcse2amst1lajmh299uq4jn.blockchainnodeengine.com/?key=AIzaSyDyUtm6b-e-xKDQgVWzlroHdVTytiXEDik"
        skip-verifications:
          - chain-id
          - pruning

  # HTTP Endpoint 3
  - name: "eth-rpc-3"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://ethereum-rpc.publicnode.com"
        skip-verifications:
          - chain-id
          - pruning

  # WebSocket Endpoint 1 (Phase 5 - Subscriptions)
  - name: "eth-ws-1"
    chain-id: "ETH1"
    api-interface: "websocket"
    node-urls:
      - url: "wss://g.w.lavanet.xyz:443/gateway/eth/rpc/4926f3fd246058892909cdda0c88f8c7"

  # WebSocket Endpoint 2 (Phase 5 - Subscriptions)
  - name: "eth-ws-2"
    chain-id: "ETH1"
    api-interface: "websocket"
    node-urls:
      - url: "wss://g.w.lavanet.xyz:443/gateway/eth/rpc/4926f3fd246058892909cdda0c88f8c7"

  # WebSocket Endpoint 3 (Phase 5 - Subscriptions)
  - name: "eth-ws-3"
    chain-id: "ETH1"
    api-interface: "websocket"
    node-urls:
      - url: "wss://ethereum-rpc.publicnode.com"

backup-direct-rpc:
  # Backup HTTP Endpoint (used only when all primary direct-rpc peers are exhausted)
  - name: "eth-rpc-backup"
    chain-id: "ETH1"
    api-interface: "jsonrpc"
    node-urls:
      - url: "https://rpc.ankr.com/eth"
        skip-verifications:
          - chain-id
          - pruning
