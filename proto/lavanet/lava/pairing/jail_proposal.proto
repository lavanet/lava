syntax = "proto3";
package lavanet.lava.pairing;

option go_package = "github.com/lavanet/lava/v5/x/pairing/types";

import "gogoproto/gogo.proto";

message JailProposal {
  option (gogoproto.goproto_getters) = false;

  string title = 1;
  string description = 2;
  repeated ProviderJailInfo providers_info = 3 [(gogoproto.nullable) = false];
}

message ProviderJailInfo {
  string provider     = 1;
  string chain_id     = 2;
  string reason       = 3;
  int64  jail_end_time = 4;
}

message UnjailProposal {
  option (gogoproto.goproto_getters) = false;

  string title = 1;
  string description = 2;
  repeated ProviderJailInfo providers_info = 3 [(gogoproto.nullable) = false];
}
