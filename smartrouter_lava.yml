  endpoints:      
    - network-address: "0.0.0.0:3360"
      chain-id: "LAV1"                                                         
      api-interface: "rest"
    - network-address: "0.0.0.0:3362"                                          
      chain-id: "LAV1"                                                         
      api-interface: "tendermintrpc"
                                                                               
  direct-rpc:     
    - name: "lava-proxy-rest"
      chain-id: "LAV1"
      api-interface: "rest"
      node-urls:                                                               
        - url: "http://127.0.0.1:11317"
          timeout: 5s                                                          
          skip-verifications:
            - chain-id
            - pruning

    - name: "lava-local-rest-1"                                                
      chain-id: "LAV1"
      api-interface: "rest"                                                    
      node-urls:  
        - url: "http://127.0.0.1:1317"
          timeout: 10s
          skip-verifications:                                                  
            - chain-id
            - pruning                                                          
                  
    - name: "lava-local-tmrpc-1"
      chain-id: "LAV1"
      api-interface: "tendermintrpc"                                           
      node-urls:
        - url: "http://127.0.0.1:26657"                                        
          timeout: 10s
          skip-verifications:
            - chain-id
            - pruning
        - url: "ws://127.0.0.1:26657/websocket"                                
          skip-verifications:
            - chain-id                                                         
            - pruning